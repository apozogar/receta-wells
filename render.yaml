services:
  - type: web
    name: menubox
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build && cd server && npm install
    startCommand: node server/server.js
    healthCheckPath: /api/auth/profile
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: menubox-db
          property: connectionString
      - key: PORT
        value: 10000

databases:
  - name: menubox-db
    plan: free
    region: frankfurt
