<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificación Boda & CrossFit</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e74c3c;
            --lunch-color: #2980b9; /* Azul como tu pizarra */
            --dinner-color: #27ae60; /* Verde como tu pizarra */
            --bg: #f4f7f6;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--primary); padding: 20px; }
        
        header { text-align: center; margin-bottom: 20px; }
        h1 { margin: 0; font-size: 1.8rem; }
        p { color: #7f8c8d; margin-top: 5px; }
        
        .controls { text-align: center; margin-bottom: 20px; }
        button {
            background-color: var(--primary); color: white; border: none; padding: 10px 20px;
            font-size: 1rem; cursor: pointer; border-radius: 5px; transition: 0.3s;
        }
        button:hover { background-color: var(--accent); }

        /* Calendario Grid */
        .calendar-container {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .day-header {
            text-align: center; font-weight: bold; padding: 10px; background: #ddd; border-radius: 5px;
        }

        .day-card {
            background: white; border-radius: 8px; padding: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            min-height: 140px; display: flex; flex-direction: column;
            border: 1px solid transparent;
        }

        .day-card.today { border: 2px solid var(--accent); }
        .day-card.empty { background: transparent; box-shadow: none; }

        .date-number { font-weight: bold; margin-bottom: 8px; font-size: 1.1rem; color: #95a5a6; }

        .meal { font-size: 0.85rem; margin-bottom: 8px; line-height: 1.3; }
        .meal strong { display: block; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 2px; }
        
        .lunch strong { color: var(--lunch-color); }
        .dinner strong { color: var(--dinner-color); }

        .tag { display: inline-block; font-size: 0.7em; padding: 2px 5px; background: #eee; border-radius: 4px; margin-top: 2px; color: #555; }

        /* Para imprimir limpio */
        @media print {
            body { background: white; padding: 0; }
            .controls { display: none; }
            .calendar-container { gap: 5px; }
            .day-card { border: 1px solid #ccc; box-shadow: none; min-height: 120px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Planificación Mensual (Objetivo Boda)</h1>
        <p>Thermomix • CrossFit • Déficit Calórico</p>
    </header>

    <div class="controls">
        <button onclick="generateCalendar()">🔄 Generar Nuevo Menú</button>
        <button onclick="window.print()" style="background-color: #7f8c8d; margin-left: 10px;">🖨️ Imprimir</button>
    </div>

    <div id="calendar" class="calendar-container">
        </div>

<script>
    // --- 1. BASE DE DATOS DE RECETAS (COPIADA DE ANTES) ---
    const recipes = [
        // LUNES: LEGUMBRES
        { id: 1, name: "Lentejas estofadas con verduras", type: "legumbres", slot: "lunch", tags: ["HP"] },
        { id: 2, name: "Garbanzos con espinacas y bacalao", type: "legumbres", slot: "lunch", tags: ["HP"] },
        { id: 3, name: "Alubias blancas con almejas", type: "legumbres", slot: "lunch", tags: ["Bajo Grasa"] },
        // MARTES: VERDURAS
        { id: 4, name: "Judías verdes + Huevo poché", type: "verduras", slot: "any", tags: ["Cena Top"] },
        { id: 5, name: "Crema de calabacín (con queso batido)", type: "verduras", slot: "any", tags: ["Ligero"] },
        { id: 6, name: "Menestra de verduras con jamón", type: "verduras", slot: "lunch", tags: ["Vit"] },
        // MIÉRCOLES: PESCADO
        { id: 7, name: "Dorada a la sal (Varoma)", type: "pescado", slot: "any", tags: ["Clean"] },
        { id: 8, name: "Merluza en salsa verde", type: "pescado", slot: "lunch", tags: ["Prot"] },
        { id: 9, name: "Salmón vapor + trigueros", type: "pescado", slot: "dinner", tags: ["Grasas"] },
        // JUEVES: PASTA
        { id: 10, name: "Pasta integral boloñesa pavo", type: "pasta", slot: "lunch", tags: ["Energía"] },
        { id: 11, name: "Zoodles (Calabacín) con gambas", type: "pasta", slot: "dinner", tags: ["Low Carb"] },
        // VIERNES: CARNE
        { id: 12, name: "Pollo al chilindrón", type: "carne", slot: "lunch", tags: ["Clásico"] },
        { id: 13, name: "Solomillo cerdo mostaza", type: "carne", slot: "lunch", tags: ["Gourmet"] },
        { id: 14, name: "Pavo estofado setas", type: "carne", slot: "any", tags: ["Saciante"] },
        // CENAS LIGERAS
        { id: 15, name: "Huevos rellenos atún (sin mayo)", type: "cena", slot: "dinner", tags: ["Rápido"] },
        { id: 16, name: "Crema calabaza y jengibre", type: "cena", slot: "dinner", tags: ["Detox"] },
        { id: 17, name: "Mejillones vapor picadillo", type: "cena", slot: "dinner", tags: ["Varoma"] },
        { id: 18, name: "Tortilla francesa + Gazpacho", type: "cena", slot: "dinner", tags: ["Express"] },
        { id: 19, name: "Revuelto setas y gambas", type: "cena", slot: "dinner", tags: ["Prot"] },
        { id: 20, name: "Sepia plancha + Ensalada", type: "cena", slot: "dinner", tags: ["Clean"] },
        // NUEVAS RECETAS THERMOMIX
        { id: 21, name: "Lentejas curry y pollo", type: "legumbres", slot: "lunch", tags: ["Exótico"] },
        { id: 22, name: "Vichyssoise ligera", type: "verduras", slot: "any", tags: ["Clásico"] },
        { id: 23, name: "Coliflor ajoarriero", type: "verduras", slot: "dinner", tags: ["Low Carb"] },
        { id: 24, name: "Marmitako de bonito", type: "pescado", slot: "lunch", tags: ["Cuchara"] },
        { id: 25, name: "Calamares en su tinta", type: "pescado", slot: "lunch", tags: ["Tradición"] },
        { id: 26, name: "Fideuá de marisco", type: "pasta", slot: "lunch", tags: ["Top"] },
        { id: 27, name: "Carrilladas vino tinto", type: "carne", slot: "lunch", tags: ["Tierno"] },
        { id: 28, name: "Pollo Tikka Masala", type: "carne", slot: "lunch", tags: ["Especias"] },
        { id: 29, name: "Sopa Juliana", type: "cena", slot: "dinner", tags: ["Detox"] },
        { id: 30, name: "Pastel calabacín y atún", type: "cena", slot: "dinner", tags: ["Varoma"] }
    ];

    // --- 2. LÓGICA DEL CALENDARIO ---
    
    // Reglas de la pizarra
    const rules = {
        1: { lunch: "legumbres", dinner: "cena" }, // Lunes
        2: { lunch: "verduras", dinner: "cena" },  // Martes
        3: { lunch: "pescado", dinner: "cena" },   // Miércoles
        4: { lunch: "pasta", dinner: "cena" },     // Jueves
        5: { lunch: "carne", dinner: "free" },     // Viernes
        6: { lunch: "free", dinner: "free" },      // Sábado
        0: { lunch: "arroz", dinner: "cena" }      // Domingo (Arroz o Batch Cooking)
    };

    function getRandomRecipe(type, excludeIds, isDinner = false) {
        if (type === "free") return { name: "✨ Libre / Fuera", id: null, tags: [] };
        if (type === "arroz") return { name: "🍚 Arroz / Batch Cooking", id: null, tags: ["Tupper"] };

        let pool = recipes.filter(r => {
            if (isDinner && r.slot === 'lunch') return false; // No pasta pesada de noche
            return (r.type === type || (type === 'cena' && r.type === 'cena')) && !excludeIds.includes(r.id);
        });

        // Si se nos acaban las recetas de un tipo, reseteamos el filtro de exclusión para ese tipo
        if (pool.length === 0) {
            pool = recipes.filter(r => r.type === type || (type === 'cena' && r.type === 'cena'));
        }

        if (pool.length === 0) return { name: "Improvisar (Verde+Prot)", id: null, tags: [] };

        const random = pool[Math.floor(Math.random() * pool.length)];
        return random;
    }

    function generateCalendar() {
        const container = document.getElementById('calendar');
        container.innerHTML = ''; // Limpiar

        // Cabeceras días
        const days = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado', 'Domingo'];
        days.forEach(d => {
            const div = document.createElement('div');
            div.className = 'day-header';
            div.innerText = d;
            container.appendChild(div);
        });

        // Configuración fecha actual
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth(); // 0-11
        
        // Primer día del mes
        const firstDay = new Date(year, month, 1);
        // Ajustar para que Lunes sea 1 (JS devuelve Domingo = 0)
        let startingDay = firstDay.getDay(); 
        if (startingDay === 0) startingDay = 7; 

        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const todayDate = now.getDate();

        // Rellenar huecos vacíos antes del día 1
        for (let i = 1; i < startingDay; i++) {
            const empty = document.createElement('div');
            empty.className = 'day-card empty';
            container.appendChild(empty);
        }

        let usedIds = [];

        // Generar días
        for (let d = 1; d <= daysInMonth; d++) {
            const currentDayDate = new Date(year, month, d);
            const dayOfWeek = currentDayDate.getDay(); // 0 (Dom) - 6 (Sab)
            
            const rule = rules[dayOfWeek];
            
            // Generar recetas
            const lunch = getRandomRecipe(rule.lunch, usedIds, false);
            if (lunch.id) usedIds.push(lunch.id);
            
            const dinner = getRandomRecipe(rule.dinner, usedIds, true);
            if (dinner.id) usedIds.push(dinner.id);

            // Crear HTML Card
            const card = document.createElement('div');
            card.className = 'day-card';
            if (d === todayDate) card.classList.add('today');

            let tagsHtmlLunch = lunch.tags ? lunch.tags.map(t => `<span class="tag">${t}</span>`).join('') : '';
            let tagsHtmlDinner = dinner.tags ? dinner.tags.map(t => `<span class="tag">${t}</span>`).join('') : '';

            card.innerHTML = `
                <div class="date-number">${d}</div>
                <div class="meal lunch">
                    <strong>ALMUERZO</strong>
                    ${lunch.name} <br> ${tagsHtmlLunch}
                </div>
                <div style="border-top: 1px dashed #eee; margin: 5px 0;"></div>
                <div class="meal dinner">
                    <strong>CENA</strong>
                    ${dinner.name} <br> ${tagsHtmlDinner}
                </div>
            `;
            container.appendChild(card);
        }
    }

    // Iniciar al cargar
    generateCalendar();

</script>
</body>
</html>
