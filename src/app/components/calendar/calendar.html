<header>
    <h1>Planificación Mensual (Objetivo Boda)</h1>
    <p>Thermomix • CrossFit • Déficit Calórico</p>
</header>

<div class="controls">
    <button (click)="generateCalendar()">🔄 Generar Nuevo Menú</button>
    <button (click)="print()" style="background-color: #7f8c8d; margin-left: 10px;">🖨️ Imprimir</button>
    <button (click)="addToShoppingList()" style="background-color: #27ae60; margin-left: 10px;">🛒 Cookidoo</button>
</div>

<div class="calendar-container">
    <div *ngFor="let day of weekDays" class="day-header">{{ day }}</div>
    
    <div *ngFor="let day of calendarDays" class="day-card" [ngClass]="{'today': day.isToday, 'empty': day.isEmpty}">
        <ng-container *ngIf="!day.isEmpty">
            <div class="date-number">{{ day.day }}</div>
            <div class="meal lunch" *ngIf="day.lunch">
                <strong>ALMUERZO</strong>
                {{ day.lunch.name }} <br>
                <span *ngFor="let tag of day.lunch.tags" class="tag">{{ tag }}</span>
            </div>
            <div style="border-top: 1px dashed #eee; margin: 5px 0;"></div>
            <div class="meal dinner" *ngIf="day.dinner">
                <strong>CENA</strong>
                {{ day.dinner.name }} <br>
                <span *ngFor="let tag of day.dinner.tags" class="tag">{{ tag }}</span>
            </div>
        </ng-container>
    </div>
</div>
