<header>
    <h1>Receta Wells</h1>
    <p>Thermomix • CrossFit • Déficit Calórico</p>
</header>

<div class="controls">
    <button (click)="generateCalendar()">🔄 Generar Nuevo Menú</button>
    <button (click)="saveCalendar()">💾 Guardar</button>
    <button (click)="loadSavedCalendar()">📂 Cargar</button>
    <button (click)="print()" class="btn-secondary">🖨️ Imprimir</button>
    <button (click)="addToShoppingList()" class="btn-success">🛒 Cookidoo</button>
</div>

<div class="calendar-container">
    <div *ngFor="let day of weekDays" class="day-header">{{ day }}</div>
    
    <div *ngFor="let day of calendarDays" class="day-card" [ngClass]="{'today': day.isToday, 'empty': day.isEmpty}">
        <ng-container *ngIf="!day.isEmpty">
            <div class="day-card-header">
                <span class="mobile-day-name">{{ day.dayName }}</span>
                <span class="date-number">{{ day.day }}</span>
            </div>
            
            <div class="meal lunch">
                <ng-container *ngIf="editingDay !== day || editingSlot !== 'lunch'">
                    <div (click)="startEdit(day, 'lunch')" class="meal-content">
                        <strong>ALMUERZO</strong>
                        {{ day.lunch?.name }} <br>
                        <span *ngFor="let tag of day.lunch?.tags" class="tag">{{ tag }}</span>
                    </div>
                </ng-container>
                <select *ngIf="editingDay === day && editingSlot === 'lunch'" [(ngModel)]="day.lunch" (change)="finishEdit()" class="meal-select">
                    <option [ngValue]="r" *ngFor="let r of availableRecipesForSlot">{{ r.name }}</option>
                </select>
            </div>

            <div style="border-top: 1px dashed #eee; margin: 5px 0;"></div>
            
            <div class="meal dinner">
                <ng-container *ngIf="editingDay !== day || editingSlot !== 'dinner'">
                    <div (click)="startEdit(day, 'dinner')" class="meal-content">
                        <strong>CENA</strong>
                        {{ day.dinner?.name }} <br>
                        <span *ngFor="let tag of day.dinner?.tags" class="tag">{{ tag }}</span>
                    </div>
                </ng-container>
                <select *ngIf="editingDay === day && editingSlot === 'dinner'" [(ngModel)]="day.dinner" (change)="finishEdit()" class="meal-select">
                    <option [ngValue]="r" *ngFor="let r of availableRecipesForSlot">{{ r.name }}</option>
                </select>
            </div>
        </ng-container>
    </div>
</div>
